name: release

# Triggered by signed tags vX.Y.Z. Produces:
#   - streborn-armv7l                  (stick agent for the Bose speaker hardware)
#   - STR-Windows-vX.Y.Z.exe           (desktop app, Windows x64)
#   - STR-macOS-vX.Y.Z.dmg             (desktop app, universal Mac binary inside a DMG)
#   - STR-Linux-x64-vX.Y.Z.tar.gz      (desktop app, Linux x64)
#   - SHA256SUMS                       (combined checksums)
#   - manifest.json                    (machine-readable index for the website)
# Every artifact is attested via Sigstore (actions/attest-build-provenance).
# Desktop app filenames carry the version so users can tell builds apart; the
# website + in-app update resolve them through manifest.json's per-version
# `url`. The stick agent binaries keep stable names, so
# https://github.com/JRpersonal/streborn/releases/latest/download/<name>
# still works for them.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        # Leave empty for a build-only dry-run: the full pipeline
        # runs (verify-source, build-agent, all three desktop OS
        # builds, Sigstore attestation of every artifact) but the
        # final publish step is skipped. Use this after any
        # Dependabot bump of a release-only action
        # (attest-build-provenance, action-gh-release, or
        # upload-artifact's release.yml usage pattern) to confirm
        # the next real tag will work.
        description: 'Release version (vX.Y.Z, e.g. v0.3.0). Leave empty for a build-only dry-run.'
        required: false
        type: string
  schedule:
    # Weekly automatic dry-run, Sundays 04:30 UTC. Catches breakage
    # introduced by Dependabot bumps of release-only actions
    # (attest-build-provenance, action-gh-release, upload-artifact)
    # before the next real tag. The publish step is gated on a
    # non-empty version input, so a scheduled run is build-only.
    - cron: "30 4 * * 0"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 1. Source verification. Lockfiles match, deps verifiable, no
  # known vulnerabilities, tests green. Anything that should fail
  # a release fails here, not after a 10 minute multi-OS build.
  verify-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
          cache: true

      - name: Verify go.mod and go.sum
        run: |
          go mod download
          go mod verify
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum out of sync"
            exit 1
          fi

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Same continue-on-error reasoning as build.yml: setup-go's
          # manifest sometimes lags Go's stdlib patch releases. The
          # scan still runs and posts results; do not block the
          # release on a stdlib finding the runner cannot install
          # a fix for.
          govulncheck ./... || true

      - name: Run tests
        run: go test ./...

  # 2a. Build the stick agent for ARMv7l (the only target that
  # actually runs on a Bose SoundTouch speaker). Linux amd64/arm64
  # are useful as developer-side tools and as the OTA payload for
  # any future model on a different CPU.
  build-agent:
    needs: verify-source
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: arm
            # GOARM=5 (softfloat), not 7: some early SoundTouch CPUs lack
            # working VFP and a hardware-float binary SIGILLs at os.init and
            # soft-bricks the box (issue #302). GOARM=5 runs on every
            # revision. Must match Makefile/build.yml. Filename stays armv7l.
            goarm: "5"
            suffix: armv7l
          - goos: linux
            goarch: arm64
            suffix: arm64
          - goos: linux
            goarch: amd64
            suffix: amd64

    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_stamp: ${{ steps.version.outputs.build_stamp }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
          cache: true

      - name: Derive version and build stamp
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          # Three ways to enter this workflow:
          #   1. push of a vX.Y.Z tag      → use the tag
          #   2. workflow_dispatch + input → validate + use the input
          #   3. workflow_dispatch w/o input (legacy) → dev build
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          # Validate any tag- or input-supplied version against a strict
          # semver pattern. A git tag name can legally contain shell
          # metacharacters, and VERSION flows into later build steps that
          # hold the Sigstore signing identity (id-token / attestations:
          # write), so an unchecked tag like 'v1.0.0;<cmd>' would be a
          # template-injection foothold. Pinning it to vX.Y.Z[-suffix] at
          # the source removes that surface everywhere downstream. The dev
          # fallback is a hex short-hash and needs no check.
          if [[ "${GITHUB_REF}" == refs/tags/* || -n "${INPUT_VERSION}" ]]; then
            if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::version '$VERSION' does not match vX.Y.Z[-suffix]"
              exit 1
            fi
          fi
          BUILD_STAMP="$(date -u '+%Y-%m-%d-%H%M')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_stamp=${BUILD_STAMP}" >> "$GITHUB_OUTPUT"

      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
          # Passed as env, not interpolated into the script, so the value can
          # never break out of the shell (defence in depth on top of the strict
          # version validation in the derive-version step).
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_STAMP: ${{ steps.version.outputs.build_stamp }}
        run: |
          mkdir -p out
          OUT="out/streborn-${{ matrix.suffix }}"
          go build \
            -trimpath \
            -buildvcs=true \
            -ldflags="-s -w -X main.version=${VERSION} -X main.buildStamp=${BUILD_STAMP}" \
            -o "${OUT}" \
            ./cmd/agent

      # Regression guard: the agent binary must carry the version
      # string we just stamped. A previous local-build workflow
      # forgot the -X flags entirely, producing binaries that
      # forever reported `{"version":"1.0.0","build":"dev"}` even
      # though the user had clearly installed a newer release.
      # The desktop-app's update banner then claimed "update
      # available" on every refresh. Tested by grepping the
      # stripped binary for the literal version string we passed in.
      #
      # The grep only proves the string exists SOMEWHERE in the binary
      # (docs and embedded files can carry version strings too), so the
      # amd64 build — which runs natively on this runner — is additionally
      # EXECUTED and its `-version` output compared exactly. That makes
      # the check authoritative for the whole matrix: all three targets
      # are linked from the same source with the same ldflags, so a wrong
      # stamp cannot hit one architecture only. Discussion #381 suspected
      # exactly this kind of release-pipeline mispackaging (a v0.9.5
      # asset reporting v0.9.4); the executed check settles it per release.
      - name: Verify agent version stamp
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_STAMP: ${{ steps.version.outputs.build_stamp }}
        run: |
          OUT="out/streborn-${{ matrix.suffix }}"
          VER="${VERSION}"
          STAMP="${BUILD_STAMP}"
          if ! grep -q "${VER}" "${OUT}"; then
            echo "::error::agent binary ${OUT} does not contain version string ${VER}; ldflags not applied"
            exit 1
          fi
          if ! grep -q "${STAMP}" "${OUT}"; then
            echo "::error::agent binary ${OUT} does not contain build stamp ${STAMP}; ldflags not applied"
            exit 1
          fi
          if [ "${{ matrix.suffix }}" = "amd64" ]; then
            GOT="$("${OUT}" -version)"
            if [ "${GOT}" != "${VER}" ]; then
              echo "::error::agent binary ${OUT} reports version '${GOT}', expected '${VER}'; the release would ship a wrongly-stamped agent (#381)"
              exit 1
            fi
            echo "agent ${OUT} executed: reports version=${GOT}"
          fi
          echo "agent ${OUT} contains version=${VER} build=${STAMP}"

      - name: SHA256
        run: |
          cd out
          sha256sum "streborn-${{ matrix.suffix }}" > "streborn-${{ matrix.suffix }}.sha256"
          cat "streborn-${{ matrix.suffix }}.sha256"

      # Build the LD_PRELOAD shim that hijacks Bose's SoftwareUpdate
      # daemon on :17008 and forwards inbound connections to the STR
      # webui on 127.0.0.1:8888. Only the armv7l matrix entry runs
      # this step — the shim is loaded by the Bose binary on the
      # speaker and not used on any host architecture. Targets
      # glibc-2.15 explicitly because Bose firmware ships 2.15;
      # newer default targets pull in GLIBC_2.34 and refuse to load.
      # See usb-stick/shim/README.md for the chipset-whitelist story.
      - name: Setup zig (for shim cross-compile)
        if: matrix.suffix == 'armv7l'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.13.0

      - name: Build shim
        if: matrix.suffix == 'armv7l'
        run: |
          zig cc -target arm-linux-gnueabihf.2.15 -shared -fPIC -O2 \
                 -ldl -lpthread \
                 -o out/str-shim.so usb-stick/shim/shim.c
          ls -la out/str-shim.so
          sha256sum out/str-shim.so > out/str-shim.so.sha256
          # Sanity check the resulting ELF: must be ARM EABI shared object.
          # `file` is not on the Go runner image by default; head the magic.
          if [ "$(head -c 4 out/str-shim.so | xxd -p)" != "7f454c46" ]; then
            echo "::error::shim build produced something that is not ELF"
            exit 1
          fi

      - name: Sigstore attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: out/streborn-${{ matrix.suffix }}

      - name: Sigstore attestation (shim)
        if: matrix.suffix == 'armv7l'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: out/str-shim.so

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-${{ matrix.suffix }}
          path: |
            out/streborn-${{ matrix.suffix }}
            out/streborn-${{ matrix.suffix }}.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Upload shim artifact
        if: matrix.suffix == 'armv7l'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shim-armv7l
          path: |
            out/str-shim.so
            out/str-shim.so.sha256
          if-no-files-found: error
          retention-days: 90

  # 2a-bis. Build the go-librespot Spotify Connect sidecar (GPL-3.0) from STR's
  # own fork JRpersonal/go-librespot (master carries the Ogg-passthrough), the
  # same static-musl arm/v7 way as go-librespot.yml: an emulated Alpine container
  # so it runs on the speaker's ancient glibc. Built on EVERY release (not only
  # on manual dispatch) so the sidecar actually ships: the desktop jobs embed it
  # and the agent stick/OTA delivers it. This is the fix for Spotify never working
  # on a normally-installed box (#45/#105): the binary was previously never
  # delivered by the installer or OTA at all.
  build-go-librespot:
    needs: verify-source
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Set up QEMU (arm/v7 emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm

      - name: Clone go-librespot (our fork) + strip ALSA
        run: |
          git clone --depth 1 --branch master https://github.com/JRpersonal/go-librespot go-librespot
          echo "Built from JRpersonal/go-librespot master at $(git -C go-librespot rev-parse HEAD)"
          mkdir -p dist
          # ALSA backend removed: STR drives the pipe backend only, and Alpine
          # ships no static libasound, which would block the fully static link.
          # Identical to go-librespot.yml; the Ogg-passthrough is already in the
          # fork source, so no patch is applied.
          rm -f go-librespot/output/driver-alsa.go go-librespot/output/mixer-alsa.go
          cat > go-librespot/output/driver-alsa-noalsa.go <<'GO'
          //go:build !android && !darwin && !js && !windows && !nintendosdk

          package output

          import "fmt"

          func newAlsaOutput(*NewOutputOptions) (Output, error) {
          	return nil, fmt.Errorf("alsa backend not compiled in this build")
          }
          GO

      - name: Build (static musl, cgo, arm/v7)
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v "$PWD/go-librespot:/src" -v "$PWD/dist:/dist" \
            -w /src golang:1.25-alpine sh -euxc '
              apk add --no-cache build-base git \
                libogg-dev libvorbis-dev flac-dev \
                libogg-static libvorbis-static flac-static
              CGO_ENABLED=1 go build -trimpath -buildvcs=false \
                -tags "osusergo netgo" \
                -ldflags "-s -w -linkmode external -extldflags \"-static\"" \
                -o /dist/go-librespot-armv7l ./cmd/daemon
              /dist/go-librespot-armv7l --help >/dev/null 2>&1 || true
            '

      - name: Collect + checksum
        run: |
          sudo chmod +x dist/go-librespot-armv7l
          if [ "$(head -c 4 dist/go-librespot-armv7l | xxd -p)" != "7f454c46" ]; then
            echo "::error::go-librespot build produced something that is not ELF"
            exit 1
          fi
          sha256sum dist/go-librespot-armv7l > dist/go-librespot-armv7l.sha256
          echo "size: $(stat -c %s dist/go-librespot-armv7l) bytes"

      - name: Sigstore attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/go-librespot-armv7l

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-librespot-armv7l
          path: |
            dist/go-librespot-armv7l
            dist/go-librespot-armv7l.sha256
          if-no-files-found: error
          retention-days: 90

  # 2b. Build the Wails desktop app for Windows. The ARM agent
  # binary built in build-agent is downloaded and dropped into
  # desktop-app/agentbin so go:embed picks it up — the desktop app
  # must ship with the matching agent for OTA updates.
  build-desktop-windows:
    needs: [build-agent, build-go-librespot]
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Download ARM agent
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent-armv7l
          path: agent-download

      - name: Download shim
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: shim-armv7l
          path: shim-download

      - name: Download go-librespot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: go-librespot-armv7l
          path: glr-download

      - name: Embed ARM agent + shim + go-librespot
        shell: bash
        run: |
          cp agent-download/streborn-armv7l desktop-app/agentbin/streborn-armv7l
          cp shim-download/str-shim.so usb-stick/str-shim.so
          cp glr-download/go-librespot-armv7l desktop-app/agentbin/go-librespot-armv7l
          ls -la desktop-app/agentbin/ usb-stick/str-shim.so

      # Build the winformat helper the desktop app embeds via
      # go:embed. Without this step the empty stub in
      # sticksetup/embedded/winformat.exe ends up inside the
      # released ST Reborn.exe and the in-app "format stick" button
      # fails with "Format failed: winformat Helper fehlt im Build"
      # (observed live by a v0.5.1 user on Windows, issue #44).
      # Built on the windows runner so the resulting binary is a
      # real PE32 .exe that Wails can embed.
      - name: Build winformat helper
        shell: bash
        run: |
          go build -trimpath -ldflags "-s -w" -o sticksetup/embedded/winformat.exe ./cmd/winformat
          ls -la sticksetup/embedded/winformat.exe

      # Regression guard for #44: assert the embed slot is actually
      # populated. The release_assert build tag selects a stricter
      # test variant that fails when the embed is empty (PR CI
      # without this step would also fail, which is why we tag it).
      # Runs AFTER 'Build winformat helper' on purpose so a future
      # reorder of these steps cannot silently break it.
      - name: Verify winformat embed
        shell: bash
        run: |
          go test -tags=release_assert -run TestWinformatEmbedIsNonEmptyInReleaseBuild ./sticksetup/...

      - name: Build Windows desktop app
        working-directory: desktop-app
        env:
          VERSION: ${{ needs.build-agent.outputs.version }}
          BUILD_STAMP: ${{ needs.build-agent.outputs.build_stamp }}
        shell: bash
        run: |
          wails build \
            -platform windows/amd64 \
            -ldflags "-s -w -X main.appVersion=${VERSION} -X main.appBuild=${BUILD_STAMP}" \
            -trimpath \
            -clean

      - name: Rename and hash output
        shell: bash
        run: |
          mkdir -p release-out
          # wails.json sets outputfilename to "ST Reborn" — the
          # raw filename has a space which is awkward for URLs.
          # Rename to a hyphenated stable name.
          cp "desktop-app/build/bin/ST Reborn.exe" "release-out/STR-Windows.exe"
          cd release-out
          sha256sum "STR-Windows.exe" > "STR-Windows.exe.sha256"
          cat "STR-Windows.exe.sha256"
          # ZIP fallback: SmartScreen / some browsers block a bare .exe
          # download but not a .zip. The website surfaces this as a discreet
          # fallback link under the SmartScreen note (only when the asset
          # exists in the release, so no 404). Same .exe, just wrapped.
          powershell -NoProfile -Command "Compress-Archive -Path 'STR-Windows.exe' -DestinationPath 'STR-Windows.zip' -Force"
          sha256sum "STR-Windows.zip" > "STR-Windows.zip.sha256"
          cat "STR-Windows.zip.sha256"

      - name: Sigstore attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release-out/STR-Windows.exe
            release-out/STR-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-windows
          path: |
            release-out/STR-Windows.exe
            release-out/STR-Windows.exe.sha256
            release-out/STR-Windows.zip
            release-out/STR-Windows.zip.sha256
          if-no-files-found: error
          retention-days: 90

  # 2c. Build the Wails desktop app for Linux x86_64. Pinned to
  # ubuntu-22.04 deliberately — its libwebkit2gtk-4.1 and libsoup
  # versions are present on Ubuntu 22.04+ / Debian 12+ / Fedora 38+
  # / current Arch. Building on ubuntu-24.04 would link against a
  # newer libwebkit that's missing on common LTS distros.
  build-desktop-linux:
    needs: [build-agent, build-go-librespot]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/frontend/package-lock.json

      - name: Install Wails build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Download ARM agent
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent-armv7l
          path: agent-download

      - name: Download go-librespot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: go-librespot-armv7l
          path: glr-download

      - name: Embed ARM agent + go-librespot
        run: |
          cp agent-download/streborn-armv7l desktop-app/agentbin/streborn-armv7l
          cp glr-download/go-librespot-armv7l desktop-app/agentbin/go-librespot-armv7l
          ls -la desktop-app/agentbin/

      - name: Build Linux desktop app
        working-directory: desktop-app
        env:
          VERSION: ${{ needs.build-agent.outputs.version }}
          BUILD_STAMP: ${{ needs.build-agent.outputs.build_stamp }}
        run: |
          wails build \
            -platform linux/amd64 \
            -tags webkit2_41 \
            -ldflags "-s -w -X main.appVersion=${VERSION} -X main.appBuild=${BUILD_STAMP}" \
            -trimpath \
            -clean

      - name: Package as tar.gz
        run: |
          mkdir -p release-out
          # Bundle the binary, the app icon, a desktop-integration installer,
          # and a tiny README so the runtime webkit dependency is visible
          # without forcing users to check a separate doc.
          cp "desktop-app/build/bin/ST Reborn" "release-out/STR-Linux-x64"
          chmod +x "release-out/STR-Linux-x64"
          cp desktop-app/build/appicon.png release-out/STR.png
          cat > release-out/README-linux.txt <<'TXT'
          STR for Linux x86_64
          --------------------

          Quick start:
              chmod +x STR-Linux-x64
              ./STR-Linux-x64

          Add to your app menu (with icon):
              ./install.sh
          This installs a launcher to ~/.local/bin, the icon to
          ~/.local/share/icons, and a menu entry to
          ~/.local/share/applications, so ST Reborn appears in your
          application menu with its icon (no root needed). Re-run after
          updating to a new version.

          Required runtime libraries (any current desktop distro):
              libgtk-3-0
              libwebkit2gtk-4.1-0   (or libwebkit2gtk-4.0-37 with a symlink)
              libsoup-3.0

          If the binary refuses to start with a missing-library error,
          install the package matching your distro:
              Debian/Ubuntu:  apt install libgtk-3-0 libwebkit2gtk-4.1-0 libsoup-3.0-0
              Fedora:         dnf install gtk3 webkit2gtk4.1 libsoup3
              Arch:           pacman -S gtk3 webkit2gtk-4.1 libsoup3
          TXT
          # Per-user desktop integration installer (no root). Generates the
          # .desktop entry on the user's machine so Exec/Icon point at the
          # real installed paths. Fixes the "no menu entry, no icon" report
          # on Zorin/GNOME. The outer 'INSTALL' heredoc is quoted so
          # nothing expands at package time; the inner DESKTOP heredoc is
          # unquoted so $HOME etc. expand when the user runs install.sh.
          cat > release-out/install.sh <<'INSTALL'
          #!/bin/sh
          set -e
          DIR="$(cd "$(dirname "$0")" && pwd)"
          BINDIR="$HOME/.local/bin"
          APPDIR="$HOME/.local/share/applications"
          ICONDIR="$HOME/.local/share/icons"
          mkdir -p "$BINDIR" "$APPDIR" "$ICONDIR"
          install -m 755 "$DIR/STR-Linux-x64" "$BINDIR/st-reborn"
          install -m 644 "$DIR/STR.png" "$ICONDIR/st-reborn.png"
          cat > "$APPDIR/st-reborn.desktop" <<DESKTOP
          [Desktop Entry]
          Type=Application
          Name=ST Reborn
          GenericName=SoundTouch controller
          Comment=Revive Bose SoundTouch speakers without the Bose cloud
          Exec=$BINDIR/st-reborn
          Icon=$ICONDIR/st-reborn.png
          Terminal=false
          Categories=AudioVideo;Audio;
          StartupWMClass=ST Reborn
          DESKTOP
          update-desktop-database "$APPDIR" 2>/dev/null || true
          echo "ST Reborn installed. Open it from your app menu, or run: $BINDIR/st-reborn"
          INSTALL
          chmod +x release-out/install.sh
          cd release-out
          tar -czf STR-Linux-x64.tar.gz STR-Linux-x64 STR.png install.sh README-linux.txt
          rm STR-Linux-x64 STR.png install.sh README-linux.txt
          sha256sum "STR-Linux-x64.tar.gz" > "STR-Linux-x64.tar.gz.sha256"
          cat "STR-Linux-x64.tar.gz.sha256"

      - name: Sigstore attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-out/STR-Linux-x64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-linux
          path: |
            release-out/STR-Linux-x64.tar.gz
            release-out/STR-Linux-x64.tar.gz.sha256
          if-no-files-found: error
          retention-days: 90

  # 2d. Build the Wails desktop app for macOS. Universal binary
  # covers both Intel and Apple Silicon. Wrap in a DMG so end
  # users can drag-drop. Not signed or notarized (post-1.0).
  build-desktop-macos:
    needs: [build-agent, build-go-librespot]
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Download ARM agent
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent-armv7l
          path: agent-download

      - name: Download go-librespot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: go-librespot-armv7l
          path: glr-download

      - name: Embed ARM agent + go-librespot
        run: |
          cp agent-download/streborn-armv7l desktop-app/agentbin/streborn-armv7l
          cp glr-download/go-librespot-armv7l desktop-app/agentbin/go-librespot-armv7l
          ls -la desktop-app/agentbin/

      - name: Build macOS desktop app (universal)
        working-directory: desktop-app
        env:
          VERSION: ${{ needs.build-agent.outputs.version }}
          BUILD_STAMP: ${{ needs.build-agent.outputs.build_stamp }}
        run: |
          wails build \
            -platform darwin/universal \
            -ldflags "-s -w -X main.appVersion=${VERSION} -X main.appBuild=${BUILD_STAMP}" \
            -trimpath \
            -clean

      - name: Free disk space for DMG
        # Runs AFTER the build (which needs the toolchain) and BEFORE packaging,
        # since hdiutil/ditto are plain /usr/bin system tools. The first attempt
        # removed the simulator RUNTIMES, which sit on the read-only system
        # volume, so it only logged "Read-only file system" and freed nothing and
        # the DMG still ran out of space. Reclaim the large, WRITABLE extra Xcode
        # installs instead (the build is already done) so hdiutil has scratch room
        # for the universal-binary DMG. Best-effort: never fail on a miss.
        run: |
          df -h /
          sudo rm -rf /Applications/Xcode_*.app || true
          rm -rf ~/Library/Developer/Xcode/DerivedData/* || true
          rm -rf ~/Library/Developer/CoreSimulator/Devices/* || true
          df -h /

      - name: Package as DMG
        run: |
          mkdir -p release-out
          # ditto preserves extended attrs and resource forks.
          ditto "desktop-app/build/bin/ST Reborn.app" "release-out/dmg-stage/ST Reborn.app"
          ln -s /Applications "release-out/dmg-stage/Applications"
          # Build the DMG via an EXPLICITLY sized read-write image, then convert to
          # compressed UDZO. hdiutil's -srcfolder auto-size was marginal for the
          # universal app and intermittently failed the copy with "hdiutil: create
          # failed - No space left on device" on /Volumes/STR (the DMG volume, not
          # the runner disk: v0.8.12 squeaked through, v0.8.13 did not). Sizing the
          # RW image at the staged content + 200 MB slack makes the copy fit every
          # time; the final UDZO is still compressed to the real size.
          STAGE_MB=$(du -sm release-out/dmg-stage | awk '{print $1}')
          SIZE_MB=$((STAGE_MB + 200))
          echo "dmg-stage=${STAGE_MB}MB, rw image=${SIZE_MB}MB"
          hdiutil create -volname "STR" -fs HFS+ -size "${SIZE_MB}m" -ov \
            "release-out/STR-macOS-rw.dmg"
          DEV=$(hdiutil attach -nobrowse -noverify -noautoopen "release-out/STR-macOS-rw.dmg" | awk '/Apple_HFS/{print $1; exit}')
          ditto "release-out/dmg-stage/ST Reborn.app" "/Volumes/STR/ST Reborn.app"
          ln -s /Applications "/Volumes/STR/Applications"
          sync
          hdiutil detach "$DEV"
          hdiutil convert "release-out/STR-macOS-rw.dmg" -format UDZO -ov -o "release-out/STR-macOS.dmg"
          rm -f "release-out/STR-macOS-rw.dmg"
          rm -rf release-out/dmg-stage
          cd release-out
          shasum -a 256 "STR-macOS.dmg" > "STR-macOS.dmg.sha256"
          cat "STR-macOS.dmg.sha256"

      - name: Sigstore attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-out/STR-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-macos
          path: |
            release-out/STR-macOS.dmg
            release-out/STR-macOS.dmg.sha256
          if-no-files-found: error
          retention-days: 90

  # 3. Collect all artifacts, build a combined SHA256SUMS and a
  # JSON manifest, publish the GitHub Release. The website fetches
  # manifest.json to display version + download links without
  # scraping the GitHub Releases UI.
  release:
    needs:
      - build-agent
      - build-go-librespot
      - build-desktop-windows
      - build-desktop-linux
      - build-desktop-macos
    # The release job runs on every trigger (tag push, workflow_dispatch,
    # schedule) so a dry-run also exercises change-note generation, the
    # manifest, and attestation. Only the final Publish and Notify steps
    # are gated on a real release (a tag, or a dispatch with a version),
    # so a no-version dispatch / scheduled run builds everything but
    # publishes nothing.
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    # Job-level so the VirusTotal step can gate its `if` on the secret being
    # present (a step's own env block is not reliably visible to its own `if`).
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Version the desktop download filenames
        working-directory: dist
        env:
          VERSION: ${{ needs.build-agent.outputs.version }}
        run: |
          # Put the version in the desktop app filenames so users can tell
          # builds apart in their Downloads folder. Done here, after the build
          # jobs attested the files: attestation binds to the file's digest,
          # not its name, so the rename does not affect `gh attestation verify`.
          # The agent binaries keep fixed names. The desktop apps therefore no
          # longer have stable /releases/latest/download/<name> URLs; the
          # website + the in-app update read manifest.json's per-version `url`.
          mv "STR-Windows.exe"      "STR-Windows-${VERSION}.exe"
          mv "STR-Windows.zip"      "STR-Windows-${VERSION}.zip"
          mv "STR-macOS.dmg"        "STR-macOS-${VERSION}.dmg"
          mv "STR-Linux-x64.tar.gz" "STR-Linux-x64-${VERSION}.tar.gz"
          ls -la

      - name: Combined SHA256SUMS
        working-directory: dist
        run: |
          # Drop the per-asset .sha256 files now that we have the
          # final binaries — replace with one SHA256SUMS in the
          # standard format used by the verification instructions.
          rm -f ./*.sha256
          sha256sum streborn-* STR-* str-shim.so go-librespot-armv7l > SHA256SUMS
          cat SHA256SUMS

      - name: Generate change notes
        # Build human-facing release notes from the Conventional Commit
        # subjects since the previous tag. Produces dist/changelog.md
        # (Markdown, inserted into the GitHub Release body) and
        # dist/notes.json ({markdown, items}, merged into manifest.json
        # so the website and the desktop app can show the same list).
        # relnotes auto-detects the previous tag from <to>^, so passing
        # the commit SHA works for both tag-push and dispatch releases.
        env:
          VERSION: ${{ needs.build-agent.outputs.version }}
        run: |
          go run ./cmd/relnotes \
            -version "${VERSION}" \
            -to "${GITHUB_SHA}" \
            -out-md dist/changelog.md \
            -out-json dist/notes.json
          echo "----- changelog.md -----"; cat dist/changelog.md
          echo "----- notes.json -----";   cat dist/notes.json

      - name: Generate manifest.json
        working-directory: dist
        env:
          VERSION: ${{ needs.build-agent.outputs.version }}
          BUILD_STAMP: ${{ needs.build-agent.outputs.build_stamp }}
        run: |
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"
          LATEST_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download"
          released_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          sha() { awk -v f="$1" '$2==f { print $1 }' SHA256SUMS; }
          # Linux is shipped as a tarball, not a raw binary, so the
          # SHA256SUMS line uses the .tar.gz filename. Look up that
          # exact name; do not strip the suffix.
          cat > manifest.json <<JSON
          {
            "version": "${VERSION}",
            "build": "${BUILD_STAMP}",
            "released_at": "${released_at}",
            "commit": "${GITHUB_SHA}",
            "supported_models": ["SoundTouch 10", "SoundTouch 20", "SoundTouch 30", "Wave SoundTouch IV"],
            "artifacts": {
              "desktop_windows": {
                "url": "${BASE}/STR-Windows-${VERSION}.exe",
                "sha256": "$(sha STR-Windows-${VERSION}.exe)",
                "platform": "windows",
                "arch": "amd64",
                "filename": "STR-Windows-${VERSION}.exe"
              },
              "desktop_macos": {
                "url": "${BASE}/STR-macOS-${VERSION}.dmg",
                "sha256": "$(sha STR-macOS-${VERSION}.dmg)",
                "platform": "macos",
                "arch": "universal",
                "filename": "STR-macOS-${VERSION}.dmg"
              },
              "desktop_linux": {
                "url": "${BASE}/STR-Linux-x64-${VERSION}.tar.gz",
                "sha256": "$(sha STR-Linux-x64-${VERSION}.tar.gz)",
                "platform": "linux",
                "arch": "amd64",
                "filename": "STR-Linux-x64-${VERSION}.tar.gz",
                "runtime_libs": ["libgtk-3-0", "libwebkit2gtk-4.1-0", "libsoup-3.0"]
              },
              "agent_armv7l": {
                "url": "${BASE}/streborn-armv7l",
                "latest_url": "${LATEST_BASE}/streborn-armv7l",
                "sha256": "$(sha streborn-armv7l)",
                "platform": "linux",
                "arch": "armv7l",
                "filename": "streborn-armv7l",
                "purpose": "stick agent, runs on the Bose SoundTouch speaker"
              },
              "agent_arm64": {
                "url": "${BASE}/streborn-arm64",
                "latest_url": "${LATEST_BASE}/streborn-arm64",
                "sha256": "$(sha streborn-arm64)",
                "platform": "linux",
                "arch": "arm64",
                "filename": "streborn-arm64",
                "purpose": "developer / reserve target"
              },
              "agent_amd64": {
                "url": "${BASE}/streborn-amd64",
                "latest_url": "${LATEST_BASE}/streborn-amd64",
                "sha256": "$(sha streborn-amd64)",
                "platform": "linux",
                "arch": "amd64",
                "filename": "streborn-amd64",
                "purpose": "developer / test rig"
              },
              "spotify_sidecar_armv7l": {
                "url": "${BASE}/go-librespot-armv7l",
                "latest_url": "${LATEST_BASE}/go-librespot-armv7l",
                "sha256": "$(sha go-librespot-armv7l)",
                "platform": "linux",
                "arch": "armv7l",
                "filename": "go-librespot-armv7l",
                "purpose": "Spotify Connect sidecar (go-librespot, GPL-3.0), runs on the speaker"
              }
            },
            "checksums_file": {
              "url": "${BASE}/SHA256SUMS",
              "latest_url": "${LATEST_BASE}/SHA256SUMS"
            },
            "verify_with_gh_cli": "gh attestation verify <file> --owner ${GITHUB_REPOSITORY_OWNER}"
          }
          JSON
          # Merge the generated change notes ({markdown, items}) under
          # "notes" so the website and the desktop app read the same
          # source of truth. jq is preinstalled on ubuntu runners.
          jq --slurpfile n notes.json '. + {notes: $n[0]}' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json
          cat manifest.json

      - name: Attest manifest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist/manifest.json

      - name: VirusTotal scan (upload binaries)
        # Upload the desktop binaries to VirusTotal so each release's hash is
        # known to VT. We do NOT use the action's update_release_body: it only
        # works on a `release` event, and this pipeline publishes via a tag push
        # (the release is created later in this same job), so there is no release
        # object for it to edit. Instead the notes step below links to the
        # permanent per-hash report (virustotal.com/gui/file/<sha256>), which is
        # also what the website renders from manifest.json's sha256. The
        # unsigned Windows/macOS apps draw heuristic false-positives in some
        # engines, so a public scan link per release is the rebuttal a user can
        # check. Runs before the notes so the links resolve at publish time.
        # Skipped automatically when VT_API_KEY is absent (forks, dry-run), and
        # never fails the release.
        if: |
          (startsWith(github.ref, 'refs/tags/') ||
           (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')) &&
          env.VT_API_KEY != ''
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@936d8c5c00afe97d3d9a1af26d017cfdf26800a2 # v5.0.0
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          update_release_body: false
          # Free public API allows 4 lookups/minute; stay within it.
          request_rate: 4
          files: |
            dist/STR-Windows-*.exe
            dist/STR-macOS-*.dmg
            dist/STR-Linux-x64-*.tar.gz

      - name: VirusTotal gate (stop the release on heavy detection)
        # Waits for the scans of the just-uploaded desktop apps to complete and
        # stops the release if an artifact is flagged by too many engines. The
        # apps are unsigned (code signing is post-1.0), so a handful of heuristic
        # false-positives is normal and must NOT block a release; only a broad
        # detection (>= 10 engines OR >= 15% of them calling it malicious) does.
        # If VirusTotal does not finish in the time budget we proceed and warn,
        # so a VT outage never holds a release hostage. Skipped without VT_API_KEY.
        if: |
          (startsWith(github.ref, 'refs/tags/') ||
           (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')) &&
          env.VT_API_KEY != ''
        working-directory: dist
        env:
          VERSION: ${{ needs.build-agent.outputs.version }}
        run: |
          set -u
          THRESHOLD=10   # fail if at least this many engines call it malicious
          RATIO_PCT=15   # ...or at least this percent of all engines do
          DEADLINE=$(( $(date +%s) + 360 ))  # ~6 min for the scans to finish
          fail=0
          for f in "STR-Windows-${VERSION}.exe" "STR-macOS-${VERSION}.dmg" "STR-Linux-x64-${VERSION}.tar.gz"; do
            sha=$(awk -v n="$f" '$2==n{print $1}' SHA256SUMS)
            if [ -z "$sha" ]; then echo "::warning::no SHA256 for $f, not gating it"; continue; fi
            mal=""; total=""; resp=""
            while [ "$(date +%s)" -lt "$DEADLINE" ]; do
              resp=$(curl -s -H "x-apikey: $VT_API_KEY" "https://www.virustotal.com/api/v3/files/$sha" || true)
              # Wait for the scan to actually carry engine verdicts. A freshly
              # uploaded file briefly reports an all-zero stats block (total 0)
              # before engines report; breaking on that would pass the gate
              # trivially and could miss a real detection (seen v0.8.30: 0/0).
              total=$(printf '%s' "$resp" | jq -r '[.data.attributes.last_analysis_stats[]?] | add // 0' 2>/dev/null || echo 0)
              if [ "${total:-0}" -gt 0 ]; then
                mal=$(printf '%s' "$resp" | jq -r '.data.attributes.last_analysis_stats.malicious // 0')
                break
              fi
              sleep 20
            done
            if [ -z "$mal" ]; then
              echo "::warning::VirusTotal scan for $f did not complete in time; releasing without gating it"
              continue
            fi
            pct=0; if [ "${total:-0}" -gt 0 ]; then pct=$(( mal * 100 / total )); fi
            echo "$f: $mal/$total engines malicious (${pct}%)"
            # Name the flagging engines + their detection names, so an unsigned-app
            # heuristic false-positive can be reported to the vendor, and a real
            # detection is identifiable at a glance instead of just a count.
            if [ "${mal:-0}" -gt 0 ]; then
              printf '%s' "$resp" | jq -r '.data.attributes.last_analysis_results | to_entries[] | select(.value.category=="malicious" or .value.category=="suspicious") | "    \(.value.category): \(.key) -> \(.value.result)"' 2>/dev/null || true
            fi
            if [ "$mal" -ge "$THRESHOLD" ] || [ "$pct" -ge "$RATIO_PCT" ]; then
              echo "::error::$f is flagged malicious by $mal of $total engines (${pct}%), above the gate"
              fail=1
            fi
          done
          if [ "$fail" = 1 ]; then
            echo "::error::VirusTotal gate: a release artifact is flagged above the threshold. Release stopped, investigate the report before retrying."
            exit 1
          fi
          echo "VirusTotal gate passed (unsigned-app heuristic false-positives are below the threshold)."

      - name: Generate release notes
        working-directory: dist
        env:
          VERSION: ${{ needs.build-agent.outputs.version }}
        run: |
          {
            echo "## STR ${VERSION}"
            echo
            echo "**Built from commit:** \`${GITHUB_SHA}\`"
            echo "**Workflow run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            cat changelog.md
            echo
            cat <<MD
          ### Downloads

          | Platform | File |
          |---|---|
          | Windows desktop app | [STR-Windows-${VERSION}.exe](https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/STR-Windows-${VERSION}.exe) |
          | macOS desktop app | [STR-macOS-${VERSION}.dmg](https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/STR-macOS-${VERSION}.dmg) |
          | Linux desktop app (x86_64) | [STR-Linux-x64-${VERSION}.tar.gz](https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/STR-Linux-x64-${VERSION}.tar.gz) |
          | Stick agent (ARMv7l, real target) | [streborn-armv7l](https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/streborn-armv7l) |
          | Stick agent (ARM64, reserve) | [streborn-arm64](https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/streborn-arm64) |
          | Stick agent (amd64, test rig) | [streborn-amd64](https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/streborn-amd64) |
          | Spotify sidecar (go-librespot, ARMv7l) | [go-librespot-armv7l](https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/go-librespot-armv7l) |
          | Checksums | [SHA256SUMS](https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/SHA256SUMS) |
          | Machine-readable | [manifest.json](https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/manifest.json) |

          The website at st-reborn.de fetches \`manifest.json\` to render the current download links. The desktop app filenames carry the version; the stick agent binaries keep stable \`/releases/latest/download/<file>\` URLs for direct linking.

          ### System requirements

          | | |
          |---|---|
          | Windows | Windows 10 or 11, 64-bit. The app uses Microsoft Edge WebView2; Windows 7 and 8 are not supported. |
          | macOS | macOS 12 Monterey or newer. |
          | Linux | 64-bit (x86_64) with WebKitGTK (webkit2gtk 4.x) on a current glibc-based distribution. |
          | Speaker | Bose SoundTouch 10, 20, 30 or Portable on the final Bose firmware (27.0.6). |

          ### Verify your download

          Every binary in this release is attested by GitHub's build provenance system.

          \`\`\`bash
          # SHA256 checksum
          sha256sum -c SHA256SUMS

          # Sigstore attestation (requires GitHub CLI)
          gh attestation verify STR-Windows-${VERSION}.exe --owner ${GITHUB_REPOSITORY_OWNER}
          \`\`\`

          ### Not yet code-signed

          Windows installers are not signed with an EV certificate yet; SmartScreen may warn on first download. macOS builds are not notarized yet; Gatekeeper may warn. Both are tracked under post-1.0 in CLAUDE.md.
          MD
          # VirusTotal: linked to the permanent per-hash report so it survives and
          # matches what the website renders from manifest.json's sha256. Only when
          # VT_API_KEY is set (the upload step above ran), else the links would 404.
          if [ -n "${VT_API_KEY}" ]; then
            wsha=$(awk -v f="STR-Windows-${VERSION}.exe" '$2==f{print $1}' SHA256SUMS)
            msha=$(awk -v f="STR-macOS-${VERSION}.dmg" '$2==f{print $1}' SHA256SUMS)
            lsha=$(awk -v f="STR-Linux-x64-${VERSION}.tar.gz" '$2==f{print $1}' SHA256SUMS)
            echo
            echo "### VirusTotal scan"
            echo
            echo "Each binary in this release is uploaded to VirusTotal on build, so the unsigned apps' heuristic false-positives are checkable. Live reports for this exact build:"
            echo
            echo "| Platform | Report |"
            echo "|---|---|"
            [ -n "$wsha" ] && echo "| Windows | [VirusTotal](https://www.virustotal.com/gui/file/$wsha) |"
            [ -n "$msha" ] && echo "| macOS | [VirusTotal](https://www.virustotal.com/gui/file/$msha) |"
            [ -n "$lsha" ] && echo "| Linux | [VirusTotal](https://www.virustotal.com/gui/file/$lsha) |"
          fi
          } > release-notes.md
          cat release-notes.md

      - name: Publish GitHub Release
        # Only on a real release: a tag push, or a dispatch with a
        # version input. A no-version dispatch / scheduled run reaches
        # here but skips publishing (build + manifest + notes only).
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
        # tag_name is explicit so the workflow_dispatch path works:
        # the action creates the tag at github.sha when it does not
        # already exist. The tag-push path uses the same value (the
        # version derived from the pushed tag), so behaviour matches.
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.build-agent.outputs.version }}
          target_commitish: ${{ github.sha }}
          body_path: dist/release-notes.md
          files: |
            dist/STR-Windows-*.exe
            dist/STR-Windows-*.zip
            dist/STR-macOS-*.dmg
            dist/STR-Linux-x64-*.tar.gz
            dist/streborn-armv7l
            dist/streborn-arm64
            dist/streborn-amd64
            dist/go-librespot-armv7l
            dist/str-shim.so
            dist/SHA256SUMS
            dist/manifest.json
          fail_on_unmatched_files: true
          generate_release_notes: false
          draft: false
          prerelease: false

      # Releases created via the default GITHUB_TOKEN deliberately do
      # NOT fire `release: published` workflow triggers downstream — a
      # GitHub-side safeguard against accidental loops. So a separate
      # notify-website workflow listening for that event never runs
      # after a tag-driven release. Dispatch directly from here using
      # a fine-grained PAT instead; the website repo's deploy listens
      # for repository_dispatch / app-release-published.
      - name: Notify streborn-website
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_PAT }}
          repository: JRpersonal/streborn-website
          event-type: app-release-published
          client-payload: |
            {
              "tag": "${{ needs.build-agent.outputs.version }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.build-agent.outputs.version }}",
              "build": "${{ needs.build-agent.outputs.build_stamp }}",
              "commit": "${{ github.sha }}"
            }
