name: Scorecard supply-chain security

# OpenSSF Scorecard: an automatic, reproducible audit of this repo's
# security posture (branch protection, pinned dependencies, signed
# releases, token hygiene, dangerous workflow patterns, ...). It runs
# weekly and on every push to main. Results are uploaded to the GitHub
# Security tab and published to the public Scorecard API, which feeds the
# Scorecard badge shown in the README. Anyone can therefore see at a
# glance how the repo is kept clean, automatically and without taking the
# maintainer's word for it.

on:
  branch_protection_rule:
  schedule:
    - cron: "30 5 * * 1" # Mondays 05:30 UTC
  push:
    branches: [main]

# Least privilege by default; the analysis job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF result to the Security tab
      id-token: write # publish results to the public Scorecard API (badge)

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
