name: go-librespot

# Builds the Spotify Connect receiver go-librespot (devgianlu, GPL-3.0)
# from STR's own fork JRpersonal/go-librespot (master, which carries the
# Ogg-passthrough) for the speaker target and attests it with Sigstore,
# exactly like the STR agent. This keeps the bundled binary transparent and
# reproducible: no opaque third-party blob ever ships to a user's speaker, and
# the fork's source is public. Primary Spotify backend for #78
# (docs/streaming/spotify.md); librespot.yml stays as a documented
# fallback.
#
# Why go-librespot over librespot-org: it ships a local HTTP control API
# (POST /player/play {uri}) so hardware preset buttons can recall a saved
# Spotify playlist autonomously, with no phone app and no Spotify Web API
# token stored on the box. The cost is the build: go-librespot decodes
# Vorbis/FLAC through cgo (libogg, libvorbis, flac), so unlike librespot's
# pure-Rust static musl it needs a cgo cross build.
#
# Target is armv7 STATIC: the speaker runs glibc 2.15 (2012), far too old
# for a modern dynamic build. We build inside an emulated arm/v7 Alpine
# (musl) container and statically link everything, so the binary runs on
# the box regardless of its ancient libc. GPL-3.0 obliges us to offer the
# source; it is public and the build is pinned + reproducible.
#
# Run it from the Actions tab (workflow_dispatch). The artifact is the
# attested go-librespot-armv7l plus its SHA256, for the on-box test.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'JRpersonal/go-librespot ref to build (branch/tag/sha; master carries the Ogg-passthrough)'
        required: true
        default: 'master'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout STR (for the passthrough patch)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU (arm/v7 emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: arm

      - name: Clone go-librespot (our fork)
        env:
          # Build from STR's own fork JRpersonal/go-librespot. Its master has the
          # Ogg-passthrough (audio_output_pipe_passthrough) MERGED, so no external
          # patch is applied any more: the source we ship is exactly what the fork
          # contains, fully public and reviewable. workflow_dispatch supplies
          # inputs.ref; the release pipeline calls this build with master too.
          REF: ${{ github.event.inputs.ref || 'master' }}
        run: |
          git clone --depth 1 --branch "$REF" https://github.com/JRpersonal/go-librespot go-librespot
          echo "Built from JRpersonal/go-librespot $REF at $(git -C go-librespot rev-parse HEAD)"
          mkdir -p dist

          # Drop the ALSA output backend. STR drives playback through the
          # pipe backend only, and Alpine ships no static libasound (.a), so
          # linking it would block the fully static armv7 build. Remove the
          # two cgo alsa files and stub the one symbol the rest of the
          # package references (newAlsaOutput, the backend switch in
          # output.go). No functional loss for the pipe backend; smaller
          # binary + less cgo surface. This is a build-time strip on top of the
          # fork source (the Ogg-passthrough already lives in the fork), and it
          # is visible here.
          rm -f go-librespot/output/driver-alsa.go go-librespot/output/mixer-alsa.go
          cat > go-librespot/output/driver-alsa-noalsa.go <<'GO'
          //go:build !android && !darwin && !js && !windows && !nintendosdk

          package output

          import "fmt"

          func newAlsaOutput(*NewOutputOptions) (Output, error) {
          	return nil, fmt.Errorf("alsa backend not compiled in this build")
          }
          GO

      - name: Build (static musl, cgo, arm/v7)
        # Native compile inside an emulated arm/v7 Alpine container so cgo
        # targets the speaker arch directly. Static link the C decoders so
        # the result runs on the box's glibc 2.15. Module + build caches
        # live under the mounted workspace so nothing leaks host state.
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v "$PWD/go-librespot:/src" -v "$PWD/dist:/dist" \
            -w /src golang:1.25-alpine sh -euxc '
              # -dev brings the headers + .so; the fully static link needs
              # the .a archives, which Alpine splits into -static subpackages.
              # No alsa: the ALSA backend was removed in the clone step (the
              # pipe backend is what STR uses), and Alpine has no static
              # libasound anyway.
              apk add --no-cache build-base git \
                libogg-dev libvorbis-dev flac-dev \
                libogg-static libvorbis-static flac-static
              # -buildvcs=false: the mounted repo is owned by the host UID,
              # so in-container git trips "dubious ownership" and Go VCS
              # stamping fails (exit 128). We log the upstream commit above
              # instead, so the stamp is not needed.
              CGO_ENABLED=1 go build -trimpath -buildvcs=false \
                -tags "osusergo netgo" \
                -ldflags "-s -w -linkmode external -extldflags \"-static\"" \
                -o /dist/go-librespot-armv7l ./cmd/daemon
              /dist/go-librespot-armv7l --help >/dev/null 2>&1 || true
            '

      - name: Collect + checksum
        run: |
          # The binary is written by the in-container root user, so the
          # unprivileged runner cannot chmod it; runners allow passwordless
          # sudo. (go build already produces it executable; this just makes
          # the bit explicit.)
          sudo chmod +x dist/go-librespot-armv7l
          file dist/go-librespot-armv7l || true
          sha256sum dist/go-librespot-armv7l | tee dist/go-librespot-armv7l.sha256
          echo "size: $(stat -c %s dist/go-librespot-armv7l) bytes"

      - name: Attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/go-librespot-armv7l

      - name: Upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-librespot-armv7l
          path: dist/*
          if-no-files-found: error
