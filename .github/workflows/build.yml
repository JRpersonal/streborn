name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... -count=1

  build:
    name: Cross Compile
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: armv7l
          - goos: linux
            goarch: arm64
            suffix: arm64
          - goos: linux
            goarch: amd64
            suffix: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Version berechnen
        id: vars
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/streborn-${{ matrix.suffix }}" \
            ./cmd/agent
          sha256sum "dist/streborn-${{ matrix.suffix }}" \
            > "dist/streborn-${{ matrix.suffix }}.sha256"

      - name: Modell Aliase fuer armv7l erzeugen
        if: matrix.suffix == 'armv7l'
        run: |
          for model in ST10 ST20 ST30 WaveSoundTouchIV; do
            cp "dist/streborn-armv7l" "dist/streborn-${model}"
            sha256sum "dist/streborn-${model}" \
              > "dist/streborn-${model}.sha256"
          done
          ls -la dist/

      - uses: actions/upload-artifact@v7
        with:
          name: streborn-${{ matrix.suffix }}
          path: dist/streborn-*

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
