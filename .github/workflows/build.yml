name: build

# CI for pull requests and pushes to main. Tag-triggered releases are
# owned by release.yml, which performs the same verification plus
# attestation and publication.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.2.2 pinned to SHA
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      # actions/setup-go v5.0.2 pinned to SHA. go-version is the
      # minor track; setup-go resolves to the latest patch so
      # govulncheck does not flag stdlib bugs fixed upstream.
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: "stable"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: "stable"
          cache: true
      # golangci/golangci-lint-action v9.2.0 pinned to SHA
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: latest
          args: --timeout=5m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    # Non-blocking until actions/setup-go's manifest stops lagging
    # upstream Go patch releases. Findings still appear in the logs;
    # remove this once setup-go reliably installs the latest 1.25.x.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: "stable"
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan
        run: govulncheck ./...

  build:
    name: Cross Compile
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: armv7l
          - goos: linux
            goarch: arm64
            suffix: arm64
          - goos: linux
            goarch: amd64
            suffix: amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: "stable"
          cache: true

      - name: Compute version
        id: vars
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/streborn-${{ matrix.suffix }}" \
            ./cmd/agent
          sha256sum "dist/streborn-${{ matrix.suffix }}" \
            > "dist/streborn-${{ matrix.suffix }}.sha256"

      - name: Generate model aliases for armv7l
        if: matrix.suffix == 'armv7l'
        run: |
          for model in ST10 ST20 ST30 WaveSoundTouchIV; do
            cp "dist/streborn-armv7l" "dist/streborn-${model}"
            sha256sum "dist/streborn-${model}" \
              > "dist/streborn-${model}.sha256"
          done
          ls -la dist/

      # actions/upload-artifact v4 pinned to SHA
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: streborn-${{ matrix.suffix }}
          path: dist/streborn-*
          if-no-files-found: error
          retention-days: 14
