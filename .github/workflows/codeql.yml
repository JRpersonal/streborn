name: CodeQL

# Static security analysis for Go. Runs on every PR and push to main,
# plus weekly so newly disclosed query patterns catch existing code.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mondays 06:30 UTC. Avoid the top of the hour to dodge GitHub's
    # scheduler congestion.
    - cron: "30 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]

    steps:
      # actions/checkout v5.0.0 pinned to SHA
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "stable"
          cache: true

      # github/codeql-action v3 pinned to SHA
      - name: Initialize CodeQL
        uses: github/codeql-action/init@458d36d7d4f47d0dd16ca424c1d3cda0060f1360
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@458d36d7d4f47d0dd16ca424c1d3cda0060f1360

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@458d36d7d4f47d0dd16ca424c1d3cda0060f1360
        with:
          category: "/language:${{ matrix.language }}"
