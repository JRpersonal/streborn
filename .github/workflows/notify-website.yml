name: Notify website on release

# Sobald hier ein Release veröffentlicht wird, feuern wir ein
# repository_dispatch Event in das JRpersonal/streborn-website Repo, damit
# dort der website-deploy.yml Workflow startet und die Site mit der neuen
# Release Info neu gebaut wird.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Repository dispatch to streborn-website
        # peter-evans/repository-dispatch v4.0.1 pinned to SHA
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_PAT }}
          repository: JRpersonal/streborn-website
          event-type: app-release-published
          client-payload: |
            {
              "tag": "${{ github.event.release.tag_name }}",
              "url": "${{ github.event.release.html_url }}",
              "published_at": "${{ github.event.release.published_at }}"
            }
